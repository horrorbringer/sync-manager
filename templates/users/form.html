{% extends 'base.html' %}
{% block title %}Add user{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">Add user</h1><p class="page-subtitle">Create an account and assign its initial role</p></div>
<form method="post" class="card card-body compact-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="row">
    <div class="col-md-6"><label class="form-label">Username</label><input class="form-control" name="username" required autofocus></div>
    <div class="col-md-6"><label class="form-label">Role</label><select class="form-select" name="role">{% for role in roles %}<option value="{{ role }}">{{ role }}</option>{% endfor %}</select></div>
    <div class="col-md-6"><label class="form-label">Password</label><input class="form-control" type="password" name="password" minlength="8" required></div>
  </div>
  <div class="mt-3"><button class="btn btn-primary">Create user</button> <a class="btn btn-outline-secondary" href="{{ url_for('users.index') }}">Cancel</a></div>
</form>
{% endblock %}
